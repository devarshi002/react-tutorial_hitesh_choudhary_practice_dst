<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="create()">click here</button>

    <script>
        function create() {
            let hello = document.createElement('hello');
            hello.textContent="helloworld";
            hello.setAttribute('class','note');
            document.body.appendChild(hello)
        }
    </script>
</body>
</html>
